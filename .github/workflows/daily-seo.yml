name: Daily SEO Content Refresh

on:
  schedule:
    - cron: '0 0 * * *' # Runs daily at midnight
  workflow_dispatch: # This adds the "Run" button for manual testing

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        # FIXED: Changed from actions/node-setup to actions/setup-node
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Generate Blog Post
        run: node daily-writer.js

      - name: Commit and Push
        run: |
          git config --global user.name "brightlane-bot"
          git config --global user.email "bot@brightlane.dev"
          git add .
          # Check if there are changes to avoid the "nothing to commit" error
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Auto-generated daily SEO post: $(date)"
            git push
          else
            echo "No new content to commit today."
          fi
