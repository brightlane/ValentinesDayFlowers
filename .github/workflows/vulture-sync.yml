name: Vulture 10K Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch: # THIS ADDS THE "RUN WORKFLOW" BUTTON IN GITHUB

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Vulture Matrix Generation
        run: |
          node vulture-gen.js
          node sitemap-generator.js

      - name: Auto-Commit Matrix
        run: |
          git config --global user.name "brightlane-vulture"
          git config --global user.email "vulture@brightlane.dev"
          git add .
          
          # This checks for changes. If no changes, it won't crash.
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Matrix Sync: $(date)"
            git push
          else
            echo "Working tree clean. Nothing to commit today."
          fi
