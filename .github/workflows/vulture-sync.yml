name: Vulture 10K Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '24'
      
      - name: Run Vulture Generator
        run: node vulture-gen.js
        
      - name: Auto-Commit Matrix
        run: |
          git config --global user.name "brightlane-vulture"
          git config --global user.email "vulture@brightlane.dev"
          git add .
          git commit -m "Vulture Matrix Sync: 100+ City Pages Generated"
          git push
