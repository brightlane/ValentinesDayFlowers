- name: Auto-Commit Matrix
        run: |
          git config --global user.name "brightlane-vulture"
          git config --global user.email "vulture@brightlane.dev"
          git add .
          # This check prevents the error if nothing changed
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Matrix Sync: $(date)"
            git push
          else
            echo "No changes to commit"
          fi
