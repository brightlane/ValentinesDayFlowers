name: Vulture 10K Sync

on:
  push:
    branches: [ main ]
  workflow_dispatch: # THIS ENABLES THE MANUAL RUN BUTTON

jobs:
  generate-matrix:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      - name: Run Vulture Matrix
        run: |
          npm install axios
          node vulture-gen.js
          node sitemap-generator.js
          node ping-engines.js
          node social-distributor.js

      - name: Auto-Commit Results
        run: |
          git config --global user.name "brightlane-vulture"
          git config --global user.email "vulture@brightlane.dev"
          git add .
          
          # Prevents error if nothing has changed since last run
          if [ -n "$(git status --porcelain)" ]; then
            git commit -m "Vulture Matrix & Social Update: $(date)"
            git push
          else
            echo "Working tree clean. No new changes to push."
          fi
